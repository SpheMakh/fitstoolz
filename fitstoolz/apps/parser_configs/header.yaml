libs:
  base:
    _include: (fitstoolz.apps.parser_configs)base.yaml

inputs:
  _use:
  - libs.base.inputs
  show:
    info: Show header and exit
    dtype: bool
    policies:
      is_flag: true
  edit:
    info: Edit FITS header entry
    dtype: List[str]
    metavar: KEY=VALUE
    policies:
      repeat: repeat
  remove:
    info: Remove header entry
    dtype: List[str]
    policies:
      repeat: repeat
  add:
    info: Add header entry
    dtype: List[str]
    metavar: KEY=VALUE
    policies:
      repeat: repeat

outputs:
  _use:
  - libs.base.outputs
