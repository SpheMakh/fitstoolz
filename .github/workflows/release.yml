# Publishes to PyPI when a v* tag is pushed.
#
# Release procedure:
#   1. Bump `version` in pyproject.toml and land it on main.
#   2. git tag -a v0.1.0 -m 'fitstoolz 0.1.0' && git push origin v0.1.0
#
# The tag must match the version in pyproject.toml; the build job refuses to
# proceed otherwise, so a mistyped tag fails before anything reaches PyPI.
# PyPI does not allow a version to be re-uploaded, even after deletion.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .
        python -m pip install --group tests
        python -m pip install build twine

    - name: Check the tag matches pyproject version
      run: |
        tag="${GITHUB_REF_NAME#v}"
        version="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
        if [ "$tag" != "$version" ]; then
          echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $version"
          exit 1
        fi
        echo "releasing $version"

    - name: Test
      run: pytest -q

    - name: Build sdist and wheel
      run: python -m build

    - name: Check distribution metadata
      run: twine check --strict dist/*

    - uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fitstoolz

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_FITSTOOLZ_TOKEN }}
